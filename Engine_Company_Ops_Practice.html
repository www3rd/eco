<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine Company Operations — Exam Prep</title>
<style>
  :root{--red:#b22222;--dark:#212529;--bg:#f4f4f6;--card:#fff;--ok:#2e7d32;--bad:#c62828;--amber:#ff8f00;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{background:var(--bg);color:var(--dark);min-height:100vh;}
  header{background:linear-gradient(135deg,#8e1b1b,#c0392b);color:#fff;padding:20px 16px;text-align:center;}
  header h1{font-size:1.35rem;}
  header p{opacity:.85;font-size:.85rem;margin-top:4px;}
  .tabs{display:flex;max-width:760px;margin:-18px auto 0;padding:0 16px;gap:8px;}
  .tab{flex:1;padding:12px;border:none;border-radius:10px 10px 0 0;background:#00000033;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;}
  .tab.active{background:var(--card);color:var(--red);box-shadow:0 -2px 8px rgba(0,0,0,.12);}
  main{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
  .card{background:var(--card);border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);padding:22px;}
  .pill{display:inline-block;background:#fdecea;color:var(--red);font-size:.72rem;font-weight:700;letter-spacing:.04em;padding:3px 10px;border-radius:999px;text-transform:uppercase;}
  .progressbar{height:8px;background:#e5e5ea;border-radius:99px;margin:14px 0 18px;overflow:hidden;}
  .progressbar div{height:100%;background:var(--red);border-radius:99px;transition:width .3s;}
  .qtext{font-size:1.08rem;font-weight:600;line-height:1.45;margin-bottom:16px;}
  .opt{display:block;width:100%;text-align:left;padding:13px 15px;margin-bottom:9px;border:2px solid #e2e2e8;border-radius:10px;background:#fafafa;font-size:.97rem;line-height:1.35;cursor:pointer;transition:all .15s;}
  .opt:hover:not(:disabled){border-color:var(--red);background:#fff;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--ok);background:#e8f5e9;font-weight:600;}
  .opt.wrong{border-color:var(--bad);background:#ffebee;}
  .explain{margin-top:14px;padding:13px 15px;border-radius:10px;font-size:.92rem;line-height:1.45;display:none;}
  .explain.ok{background:#e8f5e9;border-left:4px solid var(--ok);}
  .explain.bad{background:#fff3e0;border-left:4px solid var(--amber);}
  .btnrow{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .btn{padding:11px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;}
  .btn.primary{background:var(--red);color:#fff;}
  .btn.ghost{background:#eee;color:var(--dark);}
  .btn:disabled{opacity:.4;cursor:default;}
  .meta{display:flex;justify-content:space-between;font-size:.82rem;color:#777;margin-bottom:6px;align-items:center;}
  .score-big{font-size:3rem;font-weight:800;color:var(--red);text-align:center;}
  .score-msg{text-align:center;font-size:1.05rem;margin:8px 0 18px;}
  .missed{margin-top:14px;font-size:.9rem;}
  .missed li{margin:8px 0 8px 18px;line-height:1.4;}
  /* flashcards */
  .flash-wrap{perspective:1200px;margin:14px 0;}
  .flash{position:relative;width:100%;min-height:230px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s;}
  .flash.flipped{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:26px;text-align:center;font-size:1.08rem;line-height:1.5;}
  .front{background:linear-gradient(135deg,#8e1b1b,#c0392b);color:#fff;font-weight:600;}
  .back{background:#fff;border:2px solid var(--red);transform:rotateY(180deg);font-size:1rem;}
  .hint{text-align:center;color:#999;font-size:.8rem;margin-top:6px;}
  select{padding:9px 12px;border-radius:8px;border:1.5px solid #ccc;font-size:.9rem;background:#fff;}
  .counts{font-size:.85rem;color:#666;}
  @media(max-width:480px){.qtext{font-size:1rem}.face{font-size:.98rem;padding:18px}}
</style>
</head>

  <h1>🚒 Engine Company Operations</h1>
  <p>NYS OFPC — Exam Prep: Practice Quiz &amp; Flashcards</p>

<div class="tabs">

<script>
const Q = [
["Fire Behavior","According to the manual, what actually burns in a fire?",["Solids, once hot enough","Only vapors","Liquids and vapors equally","Anything containing carbon"],1,"Only vapors burn. Solids and liquids don't burn — they must first give off flammable vapors (via pyrolysis for solids)."],
["Fire Behavior","Pyrolysis is best described as:",["The mixing of smoke with fresh air","Heat decomposing a solid into vapors and char/ash","Combustion of a liquid fuel","Water converting to steam"],1,"Pyrolysis converts a solid into flammable gas: heat with sufficient oxygen decomposes the solid, producing vapors and char/ash."],
["Fire Behavior","A British Thermal Unit (BTU) is the heat energy needed to:",["Raise 1 gallon of water 1°F","Raise 1 pound of water 1°F","Convert 1 pound of water to steam","Raise 1 pound of water 10°F"],1,"1 BTU raises 1 pound of water 1 degree Fahrenheit."],
["Fire Behavior","How many BTUs does it take to convert 1 lb of 212°F water into 212°F steam?",["142","500","970","1,700"],2,"970 BTUs — about 7 times the heat energy it took to make cold water hot. Total from 70°F is 142 + 970 = 1,112 BTUs."],
["Fire Behavior","Average BTU production of wood is about:",["7,000 BTU/lb","14,000 BTU/lb","18,750 BTU/lb","20,500 BTU/lb"],0,"Wood ≈ 7,000 BTU/lb. Synthetics run 14,000–20,100 and gasoline 20,500 (126,000/gal) — which is why modern fires are hotter."],
["Fire Behavior","Compared to legacy fuels, today's synthetic fire loads produce:",["About the same heat, but more smoke","50% more heat","200–300% more heat, faster, with thicker toxic smoke","Less heat but more carbon monoxide"],2,"Modern synthetic fuels produce 200–300% more heat, produce it much quicker, and create much thicker, toxic, highly flammable smoke."],
["Fire Behavior","When oxygen is NOT readily available during combustion, cellulose produces:",["Carbon dioxide","Carbon monoxide","Nitrogen dioxide","Water vapor only"],1,"Limited oxygen → carbon monoxide (vapor density 0.96, slightly lighter than air, and highly flammable). Complete combustion → CO2 (inert, heavier than air)."],
["Fire Behavior","Which statement about smoke is correct per the manual?",["Smoke is mostly inert combustion products","Smoke is fuel — it contains unburned hydrocarbons and CO","Smoke only burns above 1,500°F","Smoke cannot ignite once it leaves the fire room"],1,"Smoke is fuel. It contains unburned hydrocarbons and carbon monoxide and can burn, causing serious fire development."],
["Fire Behavior","Unburned gases rise to the ceiling, spread horizontally, then ignite when they find oxygen. This is:",["Flashover","Backdraft","Rollover","Smoke explosion"],2,"That's rollover — the fire gases ignite when they get whatever they were missing (usually oxygen)."],
["Fire Behavior","Flashover occurs when:",["Fresh air suddenly reaches superheated gases","All contents of a compartment pyrolyze, release vapors, and ignite","Cool smoke is rapidly heated","The fire extends into a void space"],1,"Flashover: everything in the room gets hot enough, undergoes pyrolysis, releases flammable vapors — and it all ignites."],
["Fire Behavior","After an opening is made, a backdraft may take how long to occur?",["It is always instantaneous","30 seconds maximum","2–3 minutes","10–15 minutes"],2,"It can take 2–3 minutes for fresh air to dilute the flammable gases (smoke) down into their flammable range at the ignition source."],
["Fire Behavior","A 'smoke explosion' differs from a backdraft because the smoke:",["Already had air and just needed heat","Needed oxygen introduced","Was outside the structure","Contained no carbon monoxide"],0,"A smoke explosion is COOL smoke that is rapidly heated and ignites — it already had the air it needed, it just needed heat."],
["Fire Behavior","If entry is an absolute must under potential backdraft conditions, the manual says to:",["Enter fast and low before ignition","Vent high, introduce fresh air low, then WAIT before entering","Fog the doorway and enter immediately","Cut off all air and enter through a window"],1,"Vent (ideally high), introduce fresh air low, then wait — enter only when safe. Remember it may take 2–3 minutes."],
["Fire Behavior","Air feeding a fire can only come from:",["Behind the fire or the fire vent","HVAC systems","Above the fire","Doors on the windward side only"],0,"Two sources: behind the fire (open doors, windows) or the fire vent itself. Always ask where the air feeding the fire is coming from."],
["Fire Behavior","Identifying the fire flow path requires:",["A thermal imaging camera","A complete 360° size-up","Opening the front door first","Roof ventilation"],1,"Fire flow path identification — you MUST complete a 360-degree size-up."],
["Fire Control","One gallon of water weighs:",["6.5 lbs","7.48 lbs","8.33 lbs","10 lbs"],2,"8.33 lbs/gal. So 150 GPM = 1,250 lbs/min and 1,000 GPM = 8,000+ lbs (4 tons) per minute."],
["Fire Control","At 212°F, water converting to steam expands about:",["100 times","500 times","1,700 times","4,200 times"],2,"1,700:1 at 212°F. At 1,000°F the ratio is 4,200:1 — and steam keeps expanding as it gets hotter."],
["Fire Control","What actually extinguishes a fire, per the manual's 'Important Point'?",["Total volume of water applied","The application RATE (GPM)","Nozzle pattern selection","Water temperature"],1,"It is the application rate (GPM) that extinguishes a fire, not the total water applied."],
["Fire Control","The extinguishing properties of water are:",["Cooling, smothering, and dilution","Cooling only","Smothering and saponification","Emulsification and cooling"],0,"Cooling, smothering, and dilution."],
["Fire Control","Compressed Air Foam Systems (CAFS) are estimated to be how effective versus plain water on Class A fires?",["Equally effective","2 times","4 to 5 times","10 times"],2,"CAFS is estimated at 4–5x as effective as plain water on Class A fires. Follow manufacturer procedures; ventilation becomes even more important."],
["Fire Control","To make 'wet water' in a 500-gallon booster tank, add:",["1 gallon of Class B foam","6 ounces of dish detergent","6 gallons of Class A foam","A quart of AFFF"],1,"About 6 oz of dish detergent, circulated (flush the tank/pump after). It breaks surface tension so water seeps into the fuel — a low-cost Class A foam."],
["Fire Control","The minimum flow for any attack hose/nozzle system should be:",["95–125 GPM","150–185 GPM","200–250 GPM","300 GPM"],1,"Never use a system that can't flow at least 150–185 GPM — the industry standard for a one-room-and-contents fire in a slab-built house."],
["Fire Control","The Iowa Study (1951–52) concluded the most important factor affecting fire extinguishment is:",["Nozzle type","Rate of flow","Stream reach","Water temperature"],1,"'The rate of flow is the most important factor affecting fire extinguishment.' Nozzle type matters little if critical flow is met and the stream hits the base."],
["Fire Control","In 1984, LAFD testing determined the ideal flow for a single attack line was:",["125 GPM","150 GPM","185 GPM","250 GPM"],1,"BC Claude Greasy's testing: 150 GPM based on a 100 psi nozzle (NR = 76 psi). A 50 psi fog can flow 200 GPM with only 71 psi of reaction."],
["Fire Control","How much nozzle reaction should ONE firefighter be able to manage?",["45 lbs","60 lbs","75 lbs","95 lbs"],1,"1 FF = 60 lbs, 2 FFs = 75 lbs, 3 FFs = 95 lbs of nozzle reaction."],
["Fire Control","A 100 psi fog nozzle suffers how much more nozzle reaction than a comparable 50 psi nozzle?",["9%","25%","42%","70%"],2,"42% more nozzle reaction. And per TFT, the 50 psi fog gives up only about 9% of reach."],
["Fire Control","Automatic (constant pressure) fog nozzles must be:",["Kept on the lowest flow setting","Exercised and lubricated regularly so the spring doesn't stick","Used only on 2½″ lines","Disassembled after every fire"],1,"The internal spring can stick — exercise and lubricate them per the manufacturer regularly. VERY important."],
["Fire Control","Newer fixed-gallonage fog nozzles typically flow:",["125 GPM at 100 psi","185 GPM at 50 psi","250 GPM at 100 psi","95 GPM at 75 psi"],1,"Older nozzles: 125 GPM @ 100 psi. Newer: 185 GPM @ 50 psi."],
["Fire Control","The purpose of a nozzle is to:",["Increase water volume","Restrict flow, building velocity to project the stream","Reduce friction loss in the hose","Filter debris from the water"],1,"The nozzle restricts flow, which builds velocity to project the stream. It must be matched with the hose as a system."],
["Fire Control","Nozzle reaction is a function of:",["The hose diameter","The nozzle","The pump","The hose length"],1,"NR is a function of the nozzle, not the hose. Same GPM at the same nozzle pressure = same reaction, smooth bore or fog."],
["Positions","Which is a rule for the Nozzle Firefighter?",["Never enter the fire area without water","Always take a fog pattern inside","Chock all doors personally","Stay behind the officer at all times"],0,"Never enter the fire area without water, and never pass fire. Also: bleed air from the nozzle, control the door, keep everyone on the same side of the line."],
["Positions","'The nozzle is only as good as the ______.'",["Pump operator","Back-up firefighter","Officer","Water supply"],1,"The back-up firefighter — 2nd on the line — absorbs as much nozzle reaction as possible, positioned close, with a firm grasp, opposite and opposed."],
["Positions","The Door Firefighter (3rd on the line) should:",["Push the hose hard to the nozzle team","Feed hose to the nozzle team while maintaining a little slack","Operate the nozzle if fire is visible","Stay at the pump panel"],1,"Feed — don't push — the hose, keep slack, watch conditions, don't turn your back on the fire when withdrawing, chock doors if not a flow-path factor."],
["Positions","Which task belongs to the Control Firefighter?",["Forcing the front door","Eliminating kinks and ensuring enough lengths are stretched","Operating the deck gun","Conducting primary search"],1,"Control ensures sufficient lengths, assists with hook-up on a short stretch, feeds slack, kills kinks inside and out, and checks door chocks."],
["Positions","Deflected (off the ceiling) water does all of the following EXCEPT:",["Covers a greater area","Cools superheated gases at the ceiling","Prevents rollover/flashover by cooling overhead","Reduces steam production to zero"],3,"Deflected water covers more area, breaks up for greater heat absorption, and cools the overhead — it does not eliminate steam."],
["Size Up","In R.E.C.E.O. V.S., the letters stand for:",["Rescue, Exposure, Confinement, Extinguishment, Overhaul – Ventilation, Salvage","Respond, Evaluate, Control, Extinguish, Overhaul – Vent, Search","Rescue, Entry, Confinement, Exposure, Overhaul – Ventilation, Safety","Rescue, Exposure, Command, Extinguishment, Overhaul – Vent, Salvage"],0,"Rescue, Exposure, Confinement, Extinguishment, Overhaul — Ventilation and Salvage."],
["Size Up","In 'COAL WAS WEALTH', COAL stands for:",["Construction, Occupancy, Area, Location","Command, Occupancy, Access, Life","Construction, Openings, Apparatus, Location","Conditions, Occupancy, Area, Layout"],0,"COAL: Construction, Occupancy, Area, Location. WAS: Water supply, Apparatus/equipment, Street conditions. WEALTH: Weather, Exposures, Appliances, LIFE, Time, Height."],
["Size Up","The incident priorities, which never change, are:",["Ventilation, water supply, attack","Life safety, incident stabilization, property conservation","Size-up, attack, overhaul","Rescue, exposure, confinement"],1,"Life Safety, then Incident Stabilization, then Property Conservation guide all decision-making."],
["Size Up","Type III (Ordinary) construction is characterized by:",["All noncombustible materials","Masonry/brick exterior walls with wood joists and interior — prone to collapse from fire","Unprotected steel trusses","Dimensional heavy timber"],1,"Ordinary 'Main Street' construction: masonry walls, wood structural interior, common attics and basements — PRONE TO COLLAPSE FROM FIRE."],
["Size Up","Modern lightweight (Type V) construction can flash over in as little as:",["5 minutes or less","10 minutes","15 minutes","30 minutes"],0,"Modern construction can flash over in as little as 5 minutes or less; legacy construction takes considerably longer."],
["Size Up","In the 'WEALTH' portion of size-up, whose life do you evaluate FIRST?",["The occupants'","Your own","The IC's","Exposures'"],1,"LIFE — yours FIRST, then evaluate victim survivability."],
["Tactics","Rule Number 1 of fire attack is:",["Vent early and often","Fire attack must be properly supported","Always use the biggest line","Attack from the unburned side"],1,"Rule 1: fire attack must be properly supported. Rule 2: the water must hit the seat of the fire."],
["Tactics","In a DIRECT attack, water is applied:",["Off the ceiling to rain down","At the base of the fire","In a wide fog toward the doorway","Onto exposures first"],1,"Direct attack hits the base of the fire — cooling fuel, stopping vapor production, with little thermal-balance disruption and minimal steam."],
["Tactics","A transitional attack means:",["Two crews attack from opposite sides","Applying water from the outside, then moving in for final extinguishment once knocked down and deemed safe","Switching from fog to straight stream","Handing the line off between crews"],1,"Knock it down from the exterior, confirm the structure is still safe, then move interior to finish — also called Offensive Exterior Attack."],
["Tactics","Per the manual, fire doubles every:",["15 seconds","30 seconds","60 seconds","2 minutes"],1,"Every 30 seconds the fire doubles — and every 30 seconds it takes twice the flow rate to control it."],
["Tactics","Do hose streams push fire?",["Yes, always","Only fog streams","No — tests prove you don't push fire","Only above 250 GPM"],2,"Tests have proved hose streams do not push fire."],
["Tactics","NFPA 1410 and 1710 call for total initial streams of at least:",["150 GPM","185 GPM","300 GPM","500 GPM"],2,"300 GPM minimum (two lines) for a single room-and-contents fire, based on a 2,000 sq ft structure on a slab."],
["Tactics","The NFA quick-calculation fire flow formula is:",["(L × W) ÷ 3","(L × W × H) ÷ 100","(L + W) × 3","L × W × 0.5"],0,"NFF = (Length × Width) ÷ 3 for 100% involvement of one floor. The Iowa formula it derives from is (L × W × H) ÷ 100 for a compartment."],
["Tactics","Required fire flow for a fully involved one-story 30′ × 30′ structure:",["100 GPM","300 GPM","600 GPM","900 GPM"],1,"(30 × 30) ÷ 3 = 300 GPM. For 30′ × 50′ it would be 500 GPM."],
["Tactics","For interior exposures, add what percentage of the 100%-involvement figure per floor above the fire (max 5 floors)?",["10%","25%","50%","100%"],1,"Add 25% per floor above the fire floor (no more than five floors), and 25% per exterior side with a facing exposure."],
["Tactics","One GPM of properly applied water can theoretically control how much fire?",["1 sq ft","3 sq ft","10 sq ft","30 sq ft"],1,"Every gallon per minute can theoretically control 3 square feet of fire in a compartment, if applied correctly."],
["Tactics","A 2½″ line with a 1-1/8″ tip at 50 psi flows about:",["185 GPM","210 GPM","266 GPM","325 GPM"],2,"About 266 GPM — over a ton of water per minute. Consider where all that water is going (collapse potential)."],
["Tactics","A 50′ section of charged 2½″ hose weighs about:",["52 lbs","78 lbs","106 lbs","150 lbs"],2,"106 lbs (vs 52 lbs for 1¾″) — a big reason 2½″ has maneuverability limitations and needs practiced techniques like pinning and looping."],
["Tactics","The safest nozzle pattern for interior crews is:",["Wide fog — most heat absorption","Straight or solid stream — least steam production","Narrow fog","Broken stream"],1,"Straight/solid produces the least steam and reaches the base best. Wide fog absorbs heat fastest but creates the most steam — a hazard inside."],
["Tactics","How many hose lines maximum through a single entry point?",["One","Two","Three","No limit"],1,"No more than two lines per entry point; additional lines go through other entries — and NEVER opposing lines."],
["Tactics","Doors should be chocked:",["At the top corner","Mid-height near the latch","Low — no higher than just above the bottom hinge","Only on exit doors"],2,"Always chock low (just above the bottom hinge), and always ask whether the open door creates a flow path — maybe it should NOT be chocked."],
["Tactics","Why shouldn't you hit a drop ceiling with the nozzle stream?",["It wastes water","Water weight can collapse it without warning","It disrupts ventilation","It damages the tiles"],1,"Drop ceilings collapse from water weight without warning — and the void above can hold oxygen-starved superheated gases that can explode."],
["Tactics","A hose length bursts during an interior attack. Replace it with:",["One new length","Two lengths","A larger diameter line","A gated wye"],1,"Use TWO lengths to replace a burst length. Communicate, re-position to a safe area, and practice this in drills."],
["Standpipes","Which NFPA standard covers standpipe and hose systems?",["NFPA 13","NFPA 14","NFPA 291","NFPA 1710"],1,"NFPA 14 — Standard for the Installation of Standpipe and Hose Systems (2010 edition referenced)."],
["Standpipes","Building codes generally require standpipe systems in buildings over:",["30 feet","50 feet","75 feet","100 feet"],2,"Over 75 feet. Some codes also require them over 30 feet, in areas without apparatus access (parking garages), and where distances prevent hand stretches (terminals, tunnels, bridges)."],
["Standpipes","A Class I standpipe system is intended for use by:",["Building occupants","The fire department","Both FD and occupants","Sprinkler contractors"],1,"Class I = FD use, Class II = occupant use, Class III = both ('us, them, us and them')."],
["Standpipes","Standard LDH supply hose can only support pressures up to:",["135 psi","185 psi","230 psi","300 psi"],1,"185 psi is the limit for standard large-diameter hose."],
["Standpipes","When operating from a standpipe, connect your handline:",["On the fire floor","On the floor below the fire or in a protected stairwell","Two floors above the fire","At the FDC"],1,"Hook up where the nozzle team is protected from heat and smoke — the floor below the fire or a protected stairwell. Flush the system before connecting."],
["Standpipes","What must be attached at the standpipe outlet to manage pressure?",["A pressure-reducing elbow","An in-line pressure gauge","A ball valve","A Siamese"],1,"An in-line gauge at the outlet is a safety issue — adjust pressure while water is flowing to keep proper nozzle pressure."],
["Standpipes","Each firefighter on standpipe operations should carry a minimum of:",["1 length of hose","2 lengths of hose","3 lengths of hose","4 lengths of hose"],2,"3 lengths minimum, plus the standpipe kit and tools. The nozzle operator needs at least 50 feet of line per floor."],
["Standpipes","Regarding elevators at a high-rise fire:",["Take the car directly to the fire floor to save time","Never use them unless the FD has complete control — and never take the car to the fire floor","They may be used freely below the 10th floor","Only freight elevators may be used"],1,"Use only with complete FD control (Firefighter Phase 1 & 2), and never ride to the fire floor — connect at the floor below."],
["Hose Loads","In a Minuteman load, the nozzle is located:",["At the top of the load","At the bottom of the load","In the middle","Clipped to the crosslay cover"],1,"Nozzle at the bottom; the whole load is shouldered and plays out as you walk away from the apparatus."],
["Hose Loads","When fully deployed, a triple layer load forms what shape on the ground?",["A 'U' shape","An 'S' shape","A straight line","A horseshoe"],1,"The triple layer load pulls all hose out and forms an 'S' on the ground — good when there's distance between apparatus and objective."],
["Hose Loads","Rule of thumb for estimating the stretch:",["One 50′ length per floor","Two lengths per floor","100′ per floor","One length per 25 feet of setback"],0,"One length (50 feet) per floor. Some SOPs make the 2nd line one length longer, and a 3rd line an exterior stretch."],
["Hose Loads","A stairwell (well-hole) or rope stretch can:",["Add one length per floor","Eliminate about one length of hose per floor","Only be used below grade","Replace the need for a back-up line"],1,"Stretching vertically through the stair well-hole (or via exterior rope) eliminates roughly one length per floor. Secure with hose straps."],
["Hose Loads","Per the manual, kinks in a hoseline are:",["Unavoidable","A training issue","The pump operator's fault","Only a problem over 200 GPM"],1,"KINKS ARE A TRAINING ISSUE! Kinks kill flow — chase them inside and out."]
];

["LAFD 1984 testing (BC Greasy)","150 GPM = ideal single attack line flow at 100 psi NP (NR 76 psi). A 50 psi fog flows 200 GPM at NR 71 psi."],
["Manageable nozzle reaction: 1 / 2 / 3 firefighters","60 lbs / 75 lbs / 95 lbs."],
["100 psi vs 50 psi nozzle","100 psi nozzle has 42% MORE nozzle reaction; the 50 psi fog loses only ~9% reach (TFT)."],
["Nozzle reaction comes from…","The NOZZLE, not the hose. Same GPM + same NP = same reaction (smooth bore or fog). Basic physics."],
["4 nozzle types","Smooth bore • Fixed gallonage (old 125@100, new 185@50) • Selectable gallonage • Automatic/constant-pressure (exercise & lube the spring!). Plus dual-pressure automatics (100/55, 75/45)."],
["Chicago FD 1995 low-pressure nozzle tests","Low-pressure nozzles delivered MORE water, reduced firefighter stress via lower nozzle reaction, and promised lower maintenance costs."],
["Purpose of the nozzle","Restrict flow to build velocity and project the stream. Hose + nozzle must be a properly MATCHED system."],
["Attack line must-haves","Sufficient flow • easy to stretch/operate/advance • long enough • easily visible (your most important lifeline)."],
["Nozzle Firefighter rules","Never enter the fire area without water. Never pass fire. Bleed air at the door. Door control. All members same side of the line. Stay low and to the side. Advance: crawl, duck walk, leg out."],
["Back-up Firefighter","2nd on line. Chock doors, flake hose, absorb nozzle reaction, tight to the nozzle FF, firm grasp — opposite and opposed. 'The nozzle is only as good as the back-up.'"],
["Door Firefighter","3rd on line. Carries/flakes hose, FEEDS (doesn't push), keeps slack, watches conditions, never turns back on fire, chocks doors if not a flow-path issue."],
["Control Firefighter","Enough lengths stretched; helps operator hook up on short stretch; feeds slack; kills kinks outside and inside; checks chocks. On standpipes: adjusts pressure at the connection point using the gauge."],
["R.E.C.E.O. V.S.","Rescue • Exposure • Confinement • Extinguishment • Overhaul — Ventilation • Salvage."],
["COAL WAS WEALTH","Construction Occupancy Area Location — Water supply Apparatus Street conditions — Weather Exposures Appliances LIFE Time Height. (Evaluate YOUR life first.)"],
["Incident priorities (never change)","1. Life Safety  2. Incident Stabilization  3. Property Conservation."],
["Construction Types I–V","I Fire resistive (long stretches, standpipes) • II Non-combustible (big box, steel trusses) • III Ordinary (masonry + wood; COLLAPSE-PRONE) • IV Heavy timber (churches, mills) • V Wood frame (lightweight = fast collapse/flashover)."],
["Modes of operation","Interior Offensive • Exterior Offensive (formerly 'defensive') • Transitional (exterior knockdown → interior finish; a.k.a. Offensive Exterior Attack)."],
["Rules 1 & 2 of fire attack","1: Fire attack must be properly supported. 2: The water must hit the seat of the fire."],
["Direct vs Indirect vs Combination attack","Direct: water at the base, minimal steam/thermal disruption. Indirect: bounce water off the ceiling to rain down. Combination: start indirect, finish direct."],
["Fire growth rate","Fire doubles every 30 seconds — required flow rate doubles with it. Hose streams do NOT push fire."],
["NFPA 1410 / 1710 initial flow","Minimum 300 GPM total initial streams (two lines) for a single room-and-contents fire (2,000 ft², slab)."],
["NFA fire flow formula","NFF = (L × W) ÷ 3 for 100% of one floor. Scale by % involvement. Exposures: +25% per floor above (max 5) and per exposed side. Derived from Iowa: (L×W×H) ÷ 100 per compartment."],
["1 GPM controls…","3 square feet of fire in a compartment, when applied correctly."],
["1¾″ line numbers","Residential workhorse. Flows 150–250+ GPM; 180 GPM ideal/minimum. 50′ charged = 52 lbs."],
["2″ line facts","Actual ID 1.88″. Maneuvers like a 1¾″, flows like a 2½″. Must be matched with the right nozzle."],
["2½″ line numbers","250+ GPM, reach, knockdown, penetration. 1-1/8″ tip @ 50 psi ≈ 266 GPM (a ton+/min). 50′ charged = 106 lbs. Pin it, loop it, or strap it."],
["Straight/solid vs wide fog","Straight/solid: safest inside, least steam, best reach, least surface-area heat absorption. Wide fog: fastest heat absorption, MOST steam — interior hazard."],
["Line discipline rules","First line in operation before backup is stretched. Crews at choke points. Max 2 lines per entry. NO OPPOSING LINES. Chock doors LOW (bottom hinge)."],
["Drop ceilings","Fire-resistive (not fire load), but a stream's water weight collapses them without warning — and the void above can hold superheated oxygen-starved gases that explode."],
["Burst length procedure","Serious danger: communicate, reposition to safety, replace with TWO lengths. Must be practiced in drills."],
["NFPA 14","Standard for Installation of Standpipe and Hose Systems (2010 ed.): design, components, testing, maintenance."],
["Where are standpipes required?","Buildings over 75 ft (some codes: over 30 ft), areas without apparatus access (parking garages), long distances (airport terminals, tunnels, bridges)."],
["Standpipe classes","Class I = FD use • Class II = occupant use • Class III = both. 'Us, them, us and them.'"],
["Standpipe types","Automatic wet / automatic dry • manual wet / manual dry • combination (sprinkler + standpipe on common riser). Dry systems: FD provides the water."],
["LDH pressure limit","Standard LDH supports only up to 185 psi. Supply standpipes with 2½″ or larger; independent + redundant supplies."],
["Standpipe hookup procedure","Connect on the floor BELOW the fire (or protected stairwell) • flush the outlet first • attach an in-line pressure gauge • adjust pressure while flowing • gated wye enables a 2nd line."],
["Standpipe kit contents","In-line gauge, 2 spanner wrenches, spare control wheels, pipe wrench, wire brush, door chocks, adapters (pipe thread & NST). Each FF carries 3 lengths minimum."],
["Elevators at high-rises","Never use without complete FD control (Firefighter Phase 1 & 2). NEVER take the car to the fire floor — get off below and connect there."],
["Hose load types","Flat (easy assemble/deploy) • Minuteman (nozzle at BOTTOM, shouldered, one column) • Triple layer (all hose out, 'S' shape) • Finish load (rides on a dead load; flat/accordion/horseshoe)."],
["Estimating the stretch","One 50′ length per floor. 2nd line one length longer (per some SOPs); 3rd line = exterior stretch. Stairwell/rope stretch saves ~1 length per floor — secure with hose straps."],
["Hose buying wisdom","Sold in 50′ lengths; consider 75′/100′ (less friction loss, fewer snags). Pick target flow BEFORE buying. Consider 2″ first 100′ + 1¾″ working end. KINKS ARE A TRAINING ISSUE."],
["First-line philosophy","First line pulled is often the most important. The first 5 minutes determine the next 5 hours. The fire goes as the 1st line goes. A properly placed handline saves more lives than anything."]
];

/* ---------- state ---------- */
let order=[], qi=0, score=0, answered=false, missed=[];
let forder=[], fi=0, known=new Set();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showTab(t){
  document.getElementById('quiz').style.display = t==='quiz'?'block':'none';
  document.getElementById('flash').style.display = t==='flash'?'block':'none';
  document.getElementById('tabQuiz').classList.toggle('active',t==='quiz');
  document.getElementById('tabFlash').classList.toggle('active',t==='flash');
}

/* ---------- quiz ---------- */
function startQuiz(){
  order=shuffle([...Q.keys()]); qi=0; score=0; missed=[];
  renderQ();
}
function renderQ(){
  const el=document.getElementById('quiz');
  if(qi>=order.length){return renderResults();}
  const q=Q[order[qi]]; answered=false;
  const opts=q[2].map((t,i)=>({t,i}));
  shuffle(opts);
  el.innerHTML=`
    <div class="meta"><span class="pill">${q[0]}</span><span>Question ${qi+1} of ${order.length} · Score ${score}</span></div>
    <div class="progressbar"><div style="width:${(qi/order.length)*100}%"></div></div>
    <div class="qtext">${q[1]}</div>
    ${opts.map(o=>`<button class="opt" data-i="${o.i}" onclick="pick(this)">${o.t}</button>`).join('')}
    <div class="explain" id="exp"></div>
    <div class="btnrow">
      <button class="btn primary" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
      <button class="btn ghost" onclick="startQuiz()">Restart</button>
    </div>`;
}
function pick(btn){
  if(answered)return; answered=true;
  const q=Q[order[qi]], chosen=+btn.dataset.i, exp=document.getElementById('exp');
  document.querySelectorAll('#quiz .opt').forEach(b=>{
    b.disabled=true;
    if(+b.dataset.i===q[3])b.classList.add('correct');
  });
  if(chosen===q[3]){score++;exp.className='explain ok';exp.innerHTML='<b>✓ Correct!</b> '+q[4];}
  else{btn.classList.add('wrong');exp.className='explain bad';exp.innerHTML='<b>✗ Not quite.</b> '+q[4];missed.push(order[qi]);}
  exp.style.display='block';
  document.getElementById('nextBtn').disabled=false;
}
function nextQ(){qi++;renderQ();}
function renderResults(){
  const pct=Math.round(score/order.length*100);
  let msg = pct>=90?'Outstanding — you\'re ready. 🔥':pct>=75?'Solid — review the misses below and you\'re set.':pct>=60?'Getting there. Hit the flashcards, then retake.':'Time for another pass through the study guide, then try again.';
  const el=document.getElementById('quiz');
  el.innerHTML=`
    <div class="score-big">${pct}%</div>
    <div class="score-msg">${score} of ${order.length} correct. ${msg}</div>
    <div class="btnrow" style="justify-content:center">
      <button class="btn primary" onclick="startQuiz()">Retake Quiz</button>
      ${missed.length?`<button class="btn ghost" onclick="retryMissed()">Retry ${missed.length} Missed</button>`:''}
      <button class="btn ghost" onclick="showTab('flash')">Flashcards</button>
    </div>
    ${missed.length?`<div class="missed"><b>Review these:</b><ul>${missed.map(m=>`<li><b>${Q[m][1]}</b><br>→ ${Q[m][2][Q[m][3]]}</li>`).join('')}</ul></div>`:''}`;
}
function retryMissed(){order=shuffle([...missed]);qi=0;score=0;missed=[];renderQ();}

/* ---------- flashcards ---------- */
function startFlash(){forder=shuffle([...F.keys()]);fi=0;known=new Set();renderF();}
function renderF(){
  const el=document.getElementById('flash');
  if(forder.length===0){el.innerHTML='<p>All cards marked known — nice! <button class="btn primary" onclick="startFlash()">Start Over</button></p>';return;}
  if(fi>=forder.length)fi=0; if(fi<0)fi=forder.length-1;
  const c=F[forder[fi]];
  el.innerHTML=`
    <div class="meta"><span class="pill">Flashcards</span><span class="counts">Card ${fi+1} of ${forder.length} · ${known.size} known</span></div>
    <div class="flash-wrap"><div class="flash" id="fcard" onclick="this.classList.toggle('flipped')">
      <div class="face front">${c[0]}</div>
      <div class="face back">${c[1]}</div>
    </div></div>
    <div class="hint">tap card to flip</div>
    <div class="btnrow" style="justify-content:center">
      <button class="btn ghost" onclick="fi--;renderF()">← Prev</button>
      <button class="btn primary" onclick="markKnown()">Got it ✓</button>
      <button class="btn ghost" onclick="fi++;renderF()">Next →</button>
    </div>
    <div class="btnrow" style="justify-content:center">
      <button class="btn ghost" onclick="startFlash()">Shuffle &amp; Reset</button>
    </div>`;
}
function markKnown(){known.add(forder[fi]);forder.splice(fi,1);renderF();}

document.addEventListener('keydown',e=>{
  if(document.getElementById('flash').style.display!=='none'){
    if(e.key==='ArrowRight'){fi++;renderF();}
    else if(e.key==='ArrowLeft'){fi--;renderF();}
    else if(e.key===' '){e.preventDefault();document.getElementById('fcard')?.classList.toggle('flipped');}
  }
});

startQuiz(); startFlash();
</script>
